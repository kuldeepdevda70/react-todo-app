name: React Todo App CI/CD

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run Tests
        run: |
          npm ci
          npm test -- --watchAll=false

  # 🔐 NEW JOB: SECURITY SCAN USING TRIVY
  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan

    environment:
      name: ${{ github.ref == 'refs/heads/dev' && 'dev' || 'prod' }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: Determine Environment
        id: env
        run: |
          ENV_INPUT="${{ github.event.inputs.environment }}"
          if [ -n "$ENV_INPUT" ]; then
            ENV="$ENV_INPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            ENV="dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            ENV="prod"
          fi
          echo "ENV=$ENV" >> $GITHUB_ENV

          if [ "$ENV" == "dev" ]; then
            echo "HOST=${{ secrets.DEV_HOST }}" >> $GITHUB_ENV
            SECRET_KEY="DEV_KEY"
          elif [ "$ENV" == "prod" ]; then
            echo "HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
            SECRET_KEY="PROD_KEY"
          fi
          echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets[env.SECRET_KEY] }}

      # 🔐 Secure SSH (recommended instead of disabling host check)
      - name: Add Known Hosts
        run: |
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

      - name: Deploy Build to Server
        run: |
          echo "Deploying to $ENV server at $HOST"
          scp -r build/* ubuntu@$HOST:/home/ubuntu/build/
          ssh ubuntu@$HOST << 'EOF'
            sudo apt update
            sudo apt install nginx -y
            mkdir -p /home/ubuntu/build
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/build/* /var/www/html/
            sudo systemctl restart nginx
          EOF