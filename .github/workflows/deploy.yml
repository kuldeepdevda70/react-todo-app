name: React Todo App CI/CD

# Trigger on push to dev/master or manual dispatch
on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run Tests
        run: |
          npm install
          npm test -- --watchAll=false

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: Determine Environment
        id: env
        run: |
          # Detect branch or manual input
          ENV_INPUT="${{ github.event.inputs.environment }}"
          if [ -n "$ENV_INPUT" ]; then
            ENV="$ENV_INPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            ENV="dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            ENV="prod"
          fi

          echo "ENV=$ENV" >> $GITHUB_ENV

          # Set server host and SSH key dynamically
          if [ "$ENV" == "dev" ]; then
            echo "HOST=${{ secrets.DEV_HOST }}" >> $GITHUB_ENV
            echo "KEY=${{ secrets.DEV_KEY }}" >> $GITHUB_ENV
          elif [ "$ENV" == "prod" ]; then
            echo "HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
            echo "KEY=${{ secrets.PROD_KEY }}" >> $GITHUB_ENV

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ env.KEY }}

      - name: Deploy Build to Server
        run: |
          echo "Deploying to $ENV server at $HOST"
          scp -o StrictHostKeyChecking=no -r build/* ubuntu@$HOST:/home/ubuntu/build/
          ssh -o StrictHostKeyChecking=no ubuntu@$HOST << 'EOF'
            sudo apt update
            sudo apt install nginx -y
            mkdir -p /home/ubuntu/build
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/build/* /var/www/html/
            sudo systemctl restart nginx
          EOF