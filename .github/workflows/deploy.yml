name: Deploy React Todo App (Standard CI/CD)

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install & Build
        run: |
          npm install
          npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: build/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Run Tests
        run: |
          npm install
          npm run lint
          npm test -- --watchAll=false

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: build-files
          path: build/
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}
      - name: Upload Build & Deploy
        run: |
          scp -o StrictHostKeyChecking=no -r build/* ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/build/
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            sudo apt update
            sudo apt install nginx -y
            mkdir -p /home/ubuntu/build
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/build/* /var/www/html/
            sudo systemctl restart nginx
          EOF