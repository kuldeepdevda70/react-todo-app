name: Deploy React Todo App to EC2

on:
  push:
    branches:
      - master   # deploy only when main branch is updated

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install dependencies and build the React app
      - name: Install dependencies and build
        run: |
          yarn install
          yarn build

      # Step 4: Setup SSH for EC2
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      # Step 5: Deploy build folder to EC2
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Navigate to project folder
            cd /home/ec2-user/react-todo-app

            # Check if git is installed, if not install it
            if ! command -v git &> /dev/null
            then
              echo "Git not found, installing..."
              sudo apt update
              sudo apt install git -y
            fi

            # Pull latest code
            git pull origin main

            # Check if Nginx is installed, if not install it
            if ! command -v nginx &> /dev/null
            then
              echo "Nginx not found, installing..."
              sudo apt update
              sudo apt install nginx -y
            fi

            # Copy the build folder
            sudo rm -rf /var/www/html/*
            sudo cp -r build/* /var/www/html/

            # Restart Nginx
            sudo systemctl restart nginx
          EOF




          