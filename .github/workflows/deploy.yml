name: Deploy React Todo App (Standard CI/CD)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Checkout Code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ 3. Install & Build (ONLY HERE ✅)
      - name: Install and Build
        run: |
          npm install
          npm run build

      # ✅ 4. Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      # ✅ 5. Copy build to EC2 (IMPORTANT 🔥)
      - name: Upload build to EC2
        run: |
          scp -o StrictHostKeyChecking=no -r build/* ubuntu@3.124.192.180:/home/ubuntu/build/

      # ✅ 6. Deploy on EC2 (NO BUILD HERE ❌)
      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@3.124.192.180 << 'EOF'

            # Install Nginx if not exists
            if ! command -v nginx &> /dev/null
            then
              sudo apt update
              sudo apt install nginx -y
            fi

            # Create build folder if not exists
            mkdir -p /home/ubuntu/build

            # Clear old files
            sudo rm -rf /var/www/html/*

            # Copy new build files
            sudo cp -r /home/ubuntu/build/* /var/www/html/

            # Restart Nginx
            sudo systemctl restart nginx

          EOF